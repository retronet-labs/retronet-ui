name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go test -count=1 ./...
      - run: go vet ./...
      - run: go run ./cmd/retronet-ui -check
      - run: git diff --check
